version: "3.9"

services:

  # -------------------------------------------------------------------------
  # Qdrant 벡터 DB
  # -------------------------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:latest
    container_name: stm32_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"  # gRPC
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__SERVICE__GRPC_PORT=6334
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/readyz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # -------------------------------------------------------------------------
  # FastAPI 백엔드
  # -------------------------------------------------------------------------
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: stm32_backend
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_URL=${OLLAMA_URL:-http://host.docker.internal:11434}
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_COLLECTION=${QDRANT_COLLECTION:-stm32g4_docs}
      - PIN_AF_DB_PATH=/app/agent/pin_af_db.json
      - IOC_OUTPUT_DIR=/tmp/ioc_outputs
    volumes:
      - ioc_outputs:/tmp/ioc_outputs
      - ./agent:/app/agent:ro
    depends_on:
      qdrant:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    extra_hosts:
      - "host.docker.internal:host-gateway"  # Ollama가 호스트에서 실행될 때

  # -------------------------------------------------------------------------
  # Streamlit 프론트엔드
  # -------------------------------------------------------------------------
  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
    container_name: stm32_frontend
    ports:
      - "8501:8501"
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  qdrant_storage:
    driver: local
  ioc_outputs:
    driver: local
